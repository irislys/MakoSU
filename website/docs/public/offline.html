<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2f7259" />
    <title>Offline | MakoSU</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        color: #20242b;
        background: #edf3ee;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      }

      main {
        display: grid;
        min-height: 100%;
        place-items: center;
        padding: 24px;
      }

      section {
        width: min(520px, 100%);
        padding: 28px;
        background: #fff;
        border: 1px solid #dce4de;
        border-radius: 8px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        margin: 14px 0 0;
        color: #59635e;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        margin-top: 22px;
        padding: 10px 16px;
        color: #fff;
        background: #2f7259;
        border-radius: 6px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>MakoSU is offline</h1>
        <p>The page is not cached yet. Reconnect to the network and return to the homepage.</p>
        <a href="/MakoSU/">Return home</a>
      </section>
    </main>
  </body>
</html>
