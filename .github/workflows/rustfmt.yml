name: Rustfmt

on:
  push:
    branches: [main]
    paths:
      - "userspace/**"
      - ".github/workflows/rustfmt.yml"
  pull_request:
    branches: [main]
    paths:
      - "userspace/**"
      - ".github/workflows/rustfmt.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --manifest-path userspace/ksud/Cargo.toml -- --check
      - run: cargo fmt --manifest-path userspace/ksuinit/Cargo.toml -- --check
      - run: cargo test --manifest-path userspace/ksud/Cargo.toml --lib
