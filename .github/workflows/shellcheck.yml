name: ShellCheck

on:
  push:
    branches: [main]
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          ignore_names: gradlew
          ignore_paths: ./userspace/ksud/src/installer.sh
