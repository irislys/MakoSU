name: Android Clippy

on:
  push:
    branches: [main]
    paths:
      - "userspace/**"
      - ".github/workflows/clippy.yml"
  pull_request:
    branches: [main]
    paths:
      - "userspace/**"
      - ".github/workflows/clippy.yml"

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: android-actions/setup-android@v4
      - run: sdkmanager "ndk;29.0.14206865"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: userspace/ksud -> target
      - run: cargo install cargo-ndk --locked
      - name: Check ksud
        working-directory: userspace/ksud
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
        run: |
          cargo ndk -t arm64-v8a clippy
          cargo ndk -t x86_64 clippy
      - name: Check ksuinit
        working-directory: userspace/ksuinit
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
        run: |
          cargo ndk -t arm64-v8a clippy
          cargo ndk -t x86_64 clippy
